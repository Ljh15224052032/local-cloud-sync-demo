<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>本地仓库管理</title>
    <style>
      body {
        font-family: Arial;
        margin: 20px;
      }
      input {
        margin: 5px;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }
      button {
        margin: 2px;
      }
    </style>
  </head>
  <body>
    <h1>本地仓库管理</h1>
    <div>
      <input type="number" id="productId" placeholder="商品ID (数字)" />
      <input type="text" id="productName" placeholder="商品名称" />
      <input type="number" id="productStock" placeholder="库存数量" />
      <button id="addBtn">新增商品</button>
    </div>
    <table id="productTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>名称</th>
          <th>库存</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <!-- 动态生成的行将放在这里 -->
      </tbody>
    </table>

    <script src="common.js"></script>
    <script>
      // 定义本页面的渲染函数
      window.renderProducts = function () {
        const products = getProducts();
        const tbody = document.querySelector("#productTable tbody");
        tbody.innerHTML = ""; // 清空

        products.forEach((p) => {
          const row = document.createElement("tr");
          row.innerHTML = `
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>${p.stock}</td>
                    <td><button onclick="deleteProduct(${p.id})">删除</button></td>
                `;
          tbody.appendChild(row);
        });
      };

      // 删除商品函数（挂载到window以便onclick调用）
      window.deleteProduct = function (id) {
        let products = getProducts();
        products = products.filter((p) => p.id !== id);
        saveProducts(products);
      };

      // 新增商品
      document.getElementById("addBtn").addEventListener("click", function () {
        const idInput = document.getElementById("productId");
        const nameInput = document.getElementById("productName");
        const stockInput = document.getElementById("productStock");

        const id = parseInt(idInput.value);
        const name = nameInput.value.trim();
        const stock = parseInt(stockInput.value);

        if (!id || !name || isNaN(stock) || stock < 0) {
          alert("请完整填写信息，库存不能为负数");
          return;
        }

        let products = getProducts();
        // 检查ID是否已存在
        if (products.some((p) => p.id === id)) {
          alert("商品ID已存在，请使用其他ID");
          return;
        }

        products.push({ id, name, stock });
        saveProducts(products);

        // 清空输入框
        idInput.value = "";
        nameInput.value = "";
        stockInput.value = "";
      });

      // 初始渲染
      window.renderProducts();
    </script>
  </body>
</html>
